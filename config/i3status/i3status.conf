
general {
    colors = true
    interval = 10

    color_good = "#00ee00"
    color_degraded = "#eeee00"
    color_bad = "#ee0000"
}


#order += "disk /"
#order += "load"
#order += "ipv6"
#order += "ipv4"
order += "wireless _first_"
order += "ethernet _first_"
order += "memory"
order += "read_file brightness"
order += "volume master"
order += "battery all"
order += "tztime local"


disk "/" {
    format = "/ %avail"
}

load {
        format = "%5min"
}

wireless _first_ {
    #format_up = "W: (%quality at %essid, %bitrate) %ip"
    #format_down = "W: down"
    format_up = "%ip"
    format_down = ""
}

ethernet _first_ {
    #format_up = "E: %ip (%speed)"
    #format_down = "E: down"
    format_up = "%ip"
    format_down = ""
}

memory {
    format = "%used"
    threshold_degraded = "1G"
    format_degraded = "%used"
}

read_file brightness {
    format = "%content"
    format_bad = "%title - %errno: %error"
    path = /home/rho/.config/settings/.x11_brightness_log
    #color_good = "#00a0ff"
    color_good = "#eeeeee"
}

volume master {
    format = "%volume"
    format_muted = "muted %volume"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

battery all {
    #format = "%status %percentage | remaining: %remaining | %emptytime"
    format = "%percentage %remaining"
    format_down = ""
    status_chr = "CHR"
    status_bat = "BAT"
    status_unk = "UNK"
    status_full = "FULL"
    status_idle = "IDLE"
    path = "/sys/class/power_supply/BAT%d/uevent"
    low_threshold = 30
    threshold_type = percentage
}

tztime local {
    format = "%a %d/%m %H:%M "
}
